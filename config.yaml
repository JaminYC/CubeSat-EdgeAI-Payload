# ─────────────────────────────────────────────────────
# CubeSat EdgeAI — Configuración del pipeline
# ─────────────────────────────────────────────────────

# Carpetas de entrada/salida
paths:
  input_folder: "./Imagenes"
  output_folder: "./Resultados/pipeline_output"

# Clasificación de imágenes por nombre de archivo
classifier:
  ruler_keywords: ["ruler", "regla", "calibra", "regleta", "scale"]
  onion_keywords: ["onion", "cebolla", "cell", "celula", "epidermis", "skin", "piel"]
  fiber_keywords: ["fiber", "fibra", "cotton", "algodon", "hilo", "thread"]
  # Extensiones válidas
  extensions: [".tiff", ".tif", ".png", ".jpg", ".jpeg", ".bmp"]

# Calibración
calibration:
  # Método: "microspheres" (esferas 2µm) o "ruler" (marcas de regla)
  method: "ruler"
  microsphere_diameter_um: 2.0
  ruler_spacing_mm: 1.0
  # Fallback si no hay imagen de calibración
  default_um_per_pixel: 2.66  # Calibrado real: 1mm = 375px @ 2592x1944

# Preprocesamiento
preprocess:
  apply_clahe: true
  clahe_clip_limit: 3.0
  clahe_grid_size: 8
  denoise: true
  denoise_strength: 7
  # Normalizar iluminación (corrige viñeteo)
  correct_vignette: true

# Segmentación de cebolla (células)
onion:
  # Método: "opencv" (baseline), "cellpose", "onnx"
  method: "opencv"
  # OpenCV params
  opencv:
    blur_kernel: 5
    morph_kernel: 3
    morph_iterations: 2
    min_cell_area_px: 200
    max_cell_area_px: 50000
  # Cellpose params (Fase 2+)
  cellpose:
    model_type: "cyto3"
    diameter: null  # null = auto-detect
    flow_threshold: 0.4
    cellprob_threshold: 0.0
  # ONNX params (Fase 4 — RPi deploy)
  onnx:
    model_path: "./models/cellpose_onion.onnx"

# Segmentación de fibras
fiber:
  canny_low: 50
  canny_high: 150
  hough_threshold: 50
  hough_min_length: 30
  hough_max_gap: 10
  min_fiber_length_px: 20

# Medición
measurement:
  # Métricas a calcular para células
  cell_metrics: ["area", "perimeter", "circularity", "aspect_ratio", "solidity"]
  # Métricas para fibras
  fiber_metrics: ["length", "thickness", "angle", "crossings"]

# Exportación
export:
  save_overlays: true
  save_masks: true
  save_csv: true
  save_json: true
  save_summary: true
  overlay_alpha: 0.4
  overlay_colormap: "tab20"

# Reconstrucción FPM / Multi-frame SR
fpm:
  method: "multiangle"    # "multiangle" (lensless+OLED), "multiframe" (con shifts), "fourier" (con lente)
  upscale_factor: 2       # Factor de super-resolución (2, 3, 4)
  max_iters: 15           # Iteraciones del algoritmo
  align: true             # Alinear imágenes por ECC
  roi_size: 0             # ROI centrado en px (0 = imagen completa)
  na_obj: 0.10            # Apertura numérica efectiva (lensless: 0.05-0.15)
  # OLED SSD1306 0.96" I2C 128x64 (Soldered 333099)
  oled_width_mm: 21.744   # Área activa horizontal (datasheet)
  oled_height_mm: 10.864  # Área activa vertical (datasheet)
  oled_dot_pitch_mm: 0.17 # Pitch entre pixeles OLED
  distance_mm: 15.0       # Distancia OLED-sensor (medida real ~15mm)

# Modelos IA para microscopia
ai_enhance:
  # Cellpose: segmentacion celular
  cellpose:
    model_type: "cyto3"    # cyto3, cyto2, cyto, nuclei
    diameter: null          # null = auto-detect
    flow_threshold: 0.4
    cellprob_threshold: 0.0
  # CARE (CSBDeep): denoising / restauracion
  care:
    model_name: "2D_versatile_fluo"   # 2D_versatile_fluo, 2D_versatile_he
    model_basedir: "./models"
  # Noise2Void: denoising self-supervised
  n2v:
    model_name: "n2v_2D"
    model_basedir: "./models"
    train_on_image: true    # Entrenar en la misma imagen (no requiere ground truth)
    n_epochs: 20
  # StarDist: deteccion celular (star-convex polygons)
  stardist:
    model_name: "2D_versatile_fluo"   # 2D_versatile_fluo, 2D_versatile_he, 2D_paper_dsb2018

# Modo de operación (graceful degradation)
# "full" = IA + medición, "classic" = OpenCV only, "minimal" = solo medición
mode: "classic"

# Hardware target
hardware:
  target: "pc"  # "pc" o "rpi5"
  max_ram_mb: 4096
  use_gpu: true
